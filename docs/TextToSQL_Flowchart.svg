<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1300" font-family="Segoe UI, Calibri, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#555555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#1E7E34"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1000" height="1300" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="23" font-weight="bold" fill="#1F4E79">Text-to-SQL &#8212; How the Whole Project Works</text>
  <text x="500" y="54" text-anchor="middle" font-size="13" fill="#666666">React frontend &#183; FastAPI backend &#183; Azure OpenAI (GPT-4.1 + embeddings) &#183; FAISS &#183; PostgreSQL</text>

  <!-- ============ Connectors (drawn first, under boxes) ============ -->
  <!-- vertical spine -->
  <line x1="380" y1="116" x2="380" y2="150" stroke="#999999" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <line x1="380" y1="210" x2="380" y2="240" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="300" x2="380" y2="330" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="390" x2="380" y2="420" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="480" x2="380" y2="510" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="570" x2="380" y2="600" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="660" x2="380" y2="690" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="750" x2="380" y2="760" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- decision NO -> execute -->
  <line x1="380" y1="870" x2="380" y2="900" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="392" y="888" font-size="12" font-weight="bold" fill="#1E7E34">NO</text>
  <!-- decision YES -> blocked -->
  <line x1="480" y1="815" x2="705" y2="805" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="520" y="805" font-size="12" font-weight="bold" fill="#C0392B">YES</text>
  <!-- execute -> summarize -> return -->
  <line x1="380" y1="960" x2="380" y2="990" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="380" y1="1050" x2="380" y2="1080" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- blocked -> return (right side merge) -->
  <path d="M820,835 L820,1110 L572,1110" fill="none" stroke="#C0392B" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <!-- return -> render -->
  <line x1="380" y1="1140" x2="380" y2="1170" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- dashed connectors to external services -->
  <line x1="570" y1="360" x2="715" y2="360" stroke="#1E7E34" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="450" x2="715" y2="450" stroke="#1E7E34" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="720" x2="715" y2="720" stroke="#1E7E34" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="930" x2="715" y2="930" stroke="#1E7E34" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowGreen)"/>

  <!-- ============ Startup box ============ -->
  <rect x="160" y="60" width="440" height="56" rx="8" fill="#F4F4F4" stroke="#999999" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="380" y="82" text-anchor="middle" font-size="12.5" fill="#333333"><tspan x="380" font-weight="bold">Startup (runs once on boot)</tspan></text>
  <text x="380" y="100" text-anchor="middle" font-size="12" fill="#333333">discover databases &#183; build metadata &amp; join graphs &#183; embed schemas &#8594; FAISS</text>

  <!-- ============ Main pipeline boxes ============ -->
  <!-- N1 Frontend -->
  <rect x="190" y="150" width="380" height="60" rx="8" fill="#DBEAFE" stroke="#2E74B5" stroke-width="1.8"/>
  <text x="380" y="186" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan font-weight="bold">1)</tspan> User asks a question in plain English &#183; React UI</text>

  <!-- N2 -->
  <rect x="190" y="240" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="276" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan font-weight="bold">2)</tspan> POST /query  &#8594;  FastAPI backend</text>

  <!-- N3 -->
  <rect x="190" y="330" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="366" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan font-weight="bold">3)</tspan> Embed the question into a vector</text>

  <!-- N4 -->
  <rect x="190" y="420" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="450" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">4) Semantic search in FAISS</tspan><tspan x="380" dy="18" font-weight="normal">&#8594; top-5 relevant tables (L2 distance &#8804; 2.5)</tspan></text>

  <!-- N5 -->
  <rect x="190" y="510" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="540" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">5) Filter schema to relevant tables</tspan><tspan x="380" dy="18" font-weight="normal">(+ always include uploaded files)</tspan></text>

  <!-- N6 -->
  <rect x="190" y="600" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="636" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan font-weight="bold">6)</tspan> Load join graph (foreign-key relationships)</text>

  <!-- N7 -->
  <rect x="190" y="690" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="720" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">7) Build prompt &#8594; GPT-4.1</tspan><tspan x="380" dy="18" font-weight="normal">generates SQL + danger assessment</tspan></text>

  <!-- Decision diamond -->
  <path d="M380,760 L480,815 L380,870 L280,815 Z" fill="#FFF3CD" stroke="#B8860B" stroke-width="1.8"/>
  <text x="380" y="820" text-anchor="middle" font-size="13" font-weight="bold" fill="#7A5C00">Dangerous?</text>

  <!-- N-YES Blocked -->
  <rect x="705" y="775" width="230" height="60" rx="8" fill="#FDE2E1" stroke="#C0392B" stroke-width="1.8"/>
  <text x="820" y="805" text-anchor="middle" font-size="12.5" fill="#1A1A1A"><tspan x="820" dy="-3" font-weight="bold">Block &amp; return warning</tspan><tspan x="820" dy="18" font-weight="normal">(query NOT executed)</tspan></text>

  <!-- N8 Execute -->
  <rect x="190" y="900" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="930" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">8) Validate (SELECT-only)</tspan><tspan x="380" dy="18" font-weight="normal">&amp; execute on PostgreSQL (LIMIT 100)</tspan></text>

  <!-- N9 Summarize -->
  <rect x="190" y="990" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="1020" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">9) Summarize results with GPT-4.1</tspan><tspan x="380" dy="18" font-weight="normal">+ time, tokens &amp; complexity</tspan></text>

  <!-- N10 Return -->
  <rect x="190" y="1080" width="380" height="60" rx="8" fill="#E8F0FE" stroke="#1F4E79" stroke-width="1.8"/>
  <text x="380" y="1110" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">10) Return JSON</tspan><tspan x="380" dy="18" font-weight="normal">SQL &#183; rows &#183; summary &#183; metrics</tspan></text>

  <!-- N11 Render -->
  <rect x="190" y="1170" width="380" height="60" rx="8" fill="#DBEAFE" stroke="#2E74B5" stroke-width="1.8"/>
  <text x="380" y="1200" text-anchor="middle" font-size="13.5" fill="#1A1A1A"><tspan x="380" dy="-3" font-weight="bold">11) Render SQL, results table</tspan><tspan x="380" dy="18" font-weight="normal">&amp; AI summary in the UI</tspan></text>

  <!-- ============ External service callouts ============ -->
  <rect x="715" y="335" width="210" height="50" rx="8" fill="#E6F4EA" stroke="#1E7E34" stroke-width="1.6"/>
  <text x="820" y="360" text-anchor="middle" font-size="12" fill="#155724"><tspan x="820" dy="-3" font-weight="bold">Azure OpenAI</tspan><tspan x="820" dy="16" font-weight="normal">text-embedding-3-small</tspan></text>

  <rect x="715" y="425" width="210" height="50" rx="8" fill="#E6F4EA" stroke="#1E7E34" stroke-width="1.6"/>
  <text x="820" y="450" text-anchor="middle" font-size="12" fill="#155724"><tspan x="820" dy="-3" font-weight="bold">FAISS</tspan><tspan x="820" dy="16" font-weight="normal">vector index per database</tspan></text>

  <rect x="715" y="695" width="210" height="50" rx="8" fill="#E6F4EA" stroke="#1E7E34" stroke-width="1.6"/>
  <text x="820" y="720" text-anchor="middle" font-size="12" fill="#155724"><tspan x="820" dy="-3" font-weight="bold">Azure OpenAI</tspan><tspan x="820" dy="16" font-weight="normal">GPT-4.1 (via LangChain)</tspan></text>

  <rect x="715" y="905" width="210" height="50" rx="8" fill="#E6F4EA" stroke="#1E7E34" stroke-width="1.6"/>
  <text x="820" y="930" text-anchor="middle" font-size="12" fill="#155724"><tspan x="820" dy="-3" font-weight="bold">PostgreSQL</tspan><tspan x="820" dy="16" font-weight="normal">via SQLAlchemy</tspan></text>

  <!-- ============ Legend ============ -->
  <rect x="160" y="1252" width="680" height="34" rx="6" fill="#FBFBFB" stroke="#DDDDDD" stroke-width="1"/>
  <rect x="172" y="1262" width="14" height="14" rx="3" fill="#DBEAFE" stroke="#2E74B5"/>
  <text x="192" y="1273" font-size="11.5" fill="#333333">Frontend</text>
  <rect x="262" y="1262" width="14" height="14" rx="3" fill="#E8F0FE" stroke="#1F4E79"/>
  <text x="282" y="1273" font-size="11.5" fill="#333333">Backend step</text>
  <rect x="382" y="1262" width="14" height="14" rx="3" fill="#E6F4EA" stroke="#1E7E34"/>
  <text x="402" y="1273" font-size="11.5" fill="#333333">External service</text>
  <rect x="522" y="1262" width="14" height="14" rx="3" fill="#FFF3CD" stroke="#B8860B"/>
  <text x="542" y="1273" font-size="11.5" fill="#333333">Decision</text>
  <rect x="612" y="1262" width="14" height="14" rx="3" fill="#FDE2E1" stroke="#C0392B"/>
  <text x="632" y="1273" font-size="11.5" fill="#333333">Blocked / safety</text>
  <rect x="742" y="1262" width="14" height="14" rx="3" fill="#F4F4F4" stroke="#999999" stroke-dasharray="3,2"/>
  <text x="762" y="1273" font-size="11.5" fill="#333333">Startup</text>
</svg>
